name: Auto Release

# Conventional-commit-driven auto-release for sharperflow-security-gates.
#
# Triggers after a successful Self Test run on main. Determines the next semver
# version from commit messages (feat -> minor, fix -> patch, breaking -> major),
# creates a tag, regenerates CHANGELOG.md, publishes a GitHub Release with the
# release notes, and rolls the floating major-version tag (e.g. v0) so that
# downstream callers pinning `@v0` automatically pick up the new release.
#
# Floating major-version tags are intentional. Consumers pin `@v0` for
# "latest non-breaking" or pin a specific `@v0.1.0` for full immutability.

on:
  workflow_run:
    workflows: ["Self Test"]
    types: [completed]
    branches: [main]

concurrency:
  group: auto-release-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Auto Release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get last tag
        id: last_tag
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 --match='v[0-9]*.[0-9]*.[0-9]*' 2>/dev/null || echo "v0.0.0")
          {
            echo "tag=$LAST_TAG"
          } >> "$GITHUB_OUTPUT"
          echo "Last tag: $LAST_TAG"

      - name: Determine version bump
        id: bump
        run: |
          LAST_TAG="${{ steps.last_tag.outputs.tag }}"
          COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          echo "Commits since ${LAST_TAG}:"
          echo "$COMMITS"

          if [ -z "$COMMITS" ]; then
            echo "No new commits since last tag. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

          HAS_BREAKING=false
          HAS_FEAT=false
          HAS_FIX=false
          HAS_OTHER=false

          while IFS= read -r line; do
            if echo "$line" | grep -qE '^[a-z]+(\(.+\))?!:'; then
              HAS_BREAKING=true
            fi
            if echo "$line" | grep -qE '^feat(\(.+\))?:'; then
              HAS_FEAT=true
            fi
            if echo "$line" | grep -qE '^fix(\(.+\))?:'; then
              HAS_FIX=true
            fi
            if echo "$line" | grep -qE '^[a-z]+(\(.+\))?:'; then
              HAS_OTHER=true
            fi
          done <<< "$COMMITS"

          CURRENT="${LAST_TAG#v}"
          CURRENT="${CURRENT%%-*}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [ "$HAS_BREAKING" = true ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0; BUMP="major"
          elif [ "$HAS_FEAT" = true ]; then
            MINOR=$((MINOR + 1)); PATCH=0; BUMP="minor"
          elif [ "$HAS_FIX" = true ] || [ "$HAS_OTHER" = true ]; then
            PATCH=$((PATCH + 1)); BUMP="patch"
          else
            echo "No conventional commits found. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          MAJOR_TAG="v${MAJOR}"
          echo "Bump: $BUMP ($LAST_TAG -> $NEW_TAG, floating major: $MAJOR_TAG)"
          {
            echo "new_tag=$NEW_TAG"
            echo "major_tag=$MAJOR_TAG"
            echo "bump=$BUMP"
          } >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        if: steps.bump.outputs.skip != 'true'
        run: |
          set -euo pipefail
          LAST_TAG="${{ steps.last_tag.outputs.tag }}"

          FEAT_ENTRIES=""
          FIX_ENTRIES=""
          OTHER_ENTRIES=""

          COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s")

          while IFS= read -r line; do
            MSG=$(echo "$line" | sed -E 's/^[a-z]+(\(.+\))?:\s*//')
            if echo "$line" | grep -qE '^feat(\(.+\))?:'; then
              FEAT_ENTRIES="${FEAT_ENTRIES}
          - ${MSG}"
            elif echo "$line" | grep -qE '^fix(\(.+\))?:'; then
              FIX_ENTRIES="${FIX_ENTRIES}
          - ${MSG}"
            elif echo "$line" | grep -qE '^(chore|ci|docs|refactor|test|perf|style|build)(\(.+\))?:'; then
              SCOPE=$(echo "$line" | sed -E 's/^([a-z]+)(\((.+)\))?:.*/\3/' | head -1)
              PREFIX=$(echo "$line" | sed -E 's/^([a-z]+)(\(.+\))?:.*/\1/')
              if [ -n "$SCOPE" ] && [ "$SCOPE" != "$PREFIX" ]; then
                OTHER_ENTRIES="${OTHER_ENTRIES}
          - ${MSG} (${PREFIX}: ${SCOPE})"
              else
                OTHER_ENTRIES="${OTHER_ENTRIES}
          - ${MSG} (${PREFIX})"
              fi
            fi
          done <<< "$COMMITS"

          BODY=""
          [ -n "$FEAT_ENTRIES" ] && BODY="${BODY}
          ### Added
          ${FEAT_ENTRIES}
          "
          [ -n "$FIX_ENTRIES" ] && BODY="${BODY}
          ### Fixed
          ${FIX_ENTRIES}
          "
          [ -n "$OTHER_ENTRIES" ] && BODY="${BODY}
          ### Changed
          ${OTHER_ENTRIES}
          "

          # Multiline output via heredoc delimiter
          {
            echo "body<<NOTES_EOF"
            echo "$BODY"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Tag and roll floating major tag
        if: steps.bump.outputs.skip != 'true'
        run: |
          set -euo pipefail
          NEW_TAG="${{ steps.bump.outputs.new_tag }}"
          MAJOR_TAG="${{ steps.bump.outputs.major_tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Release ${NEW_TAG}"
          # Roll floating major-version tag so @v0 pins pick up new patches/minors automatically.
          git tag -f -a "$MAJOR_TAG" -m "Floating tag for ${MAJOR_TAG} (currently ${NEW_TAG})"
          # Tags only — CHANGELOG.md updates land via normal PRs (avoids
          # bypassing branch protection's required status checks on main).
          git push origin "$NEW_TAG"
          git push --force origin "$MAJOR_TAG"

      - name: Create Release
        if: steps.bump.outputs.skip != 'true'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ steps.bump.outputs.new_tag }}
          generate_release_notes: true
          body: |
            ${{ steps.notes.outputs.body }}

            ---

            Floating major-version tag `${{ steps.bump.outputs.major_tag }}` now points at this release.
            Consumers can pin `uses: Sharper-Flow/sharperflow-security-gates/.github/workflows/<gate>.yml@${{ steps.bump.outputs.major_tag }}` for "latest non-breaking", or pin `@${{ steps.bump.outputs.new_tag }}` for full immutability.

      - name: Summary
        if: steps.bump.outputs.skip != 'true'
        run: |
          {
            echo "## Auto Release"
            echo "**${{ steps.bump.outputs.new_tag }}** (${{ steps.bump.outputs.bump }} from ${{ steps.last_tag.outputs.tag }})"
            echo "Floating major tag rolled: \`${{ steps.bump.outputs.major_tag }}\` -> \`${{ steps.bump.outputs.new_tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Skip summary
        if: steps.bump.outputs.skip == 'true'
        run: echo "## No Release Needed" >> "$GITHUB_STEP_SUMMARY"
