name: Python Security Gate

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version used to run Python-native tools.
        required: false
        type: string
        default: "3.13"
      scan-paths:
        description: Space-separated paths to scan.
        required: false
        type: string
        default: "."
      lockfile-path:
        description: Dependency lockfile for OSV scanning.
        required: false
        type: string
        default: "uv.lock"
      semgrep-configs:
        description: Space-separated Semgrep configs.
        required: false
        type: string
        default: "p/python p/fastapi"
      semgrep-excludes:
        description: Space-separated paths to exclude from Semgrep.
        required: false
        type: string
        default: "tests scripts migrations"
      bandit-config:
        description: Optional Bandit config path in caller repository.
        required: false
        type: string
        default: ""
      run-trivy-fs:
        description: Run Trivy filesystem scan for vulnerabilities, secrets, and IaC misconfig.
        required: false
        type: boolean
        default: true
      trivy-severity:
        description: Trivy severities that fail the gate.
        required: false
        type: string
        default: "HIGH,CRITICAL"
      gitleaks-image:
        description: Pinned Gitleaks container image.
        required: false
        type: string
        default: "zricethezav/gitleaks:v8.30.0"
      trivy-ignorefile:
        description: |
          Comma-separated relative paths to Trivy ignore file(s) in the caller
          repository. Pass either one or more `.trivyignore` files or a single
          `.trivyignore.yaml`. Use to suppress known false positives that the
          gate would otherwise fail on. Empty (default) means no suppressions.
        required: false
        type: string
        default: ""
      gitleaks-config:
        description: |
          Relative path to the caller's Gitleaks config (e.g. `.gitleaks.toml`).
          When set, the Gitleaks job mounts the config into the container and
          passes `--config <path>` so caller-defined `[allowlist]` rules are
          respected. Empty (default) runs Gitleaks with built-in rules only.
        required: false
        type: string
        default: ""
      sbom-format:
        description: |
          When set, the Trivy filesystem scan also emits a Software Bill of
          Materials (SBOM) and uploads it as a workflow artifact. Allowed
          values: `cyclonedx`, `spdx`. Empty (default) means no SBOM.
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  semgrep-bandit:
    name: Semgrep + Bandit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install pipx runner
        run: python -m pip install --user pipx

      - name: Semgrep security scan
        env:
          SEMGREP_CONFIGS: ${{ inputs.semgrep-configs }}
          SEMGREP_EXCLUDES: ${{ inputs.semgrep-excludes }}
          SCAN_PATHS: ${{ inputs.scan-paths }}
        run: |
          set -euo pipefail
          config_args=()
          for config in ${SEMGREP_CONFIGS}; do
            config_args+=(--config "${config}")
          done

          exclude_args=()
          for path in ${SEMGREP_EXCLUDES}; do
            exclude_args+=(--exclude "${path}")
          done

          # shellcheck disable=SC2153 # Provided by workflow env.
          read -r -a scan_paths <<< "${SCAN_PATHS}"
          python -m pipx run semgrep "${config_args[@]}" --error "${exclude_args[@]}" "${scan_paths[@]}"

      - name: Bandit high-signal scan
        env:
          BANDIT_CONFIG: ${{ inputs.bandit-config }}
          SCAN_PATHS: ${{ inputs.scan-paths }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC2153 # Provided by workflow env.
          read -r -a scan_paths <<< "${SCAN_PATHS}"
          bandit_args=(-r "${scan_paths[@]}" -lll -iii)
          if [[ -n "${BANDIT_CONFIG}" && -f "${BANDIT_CONFIG}" ]]; then
            bandit_args+=(-c "${BANDIT_CONFIG}")
          fi
          python -m pipx run --spec 'bandit[toml]' bandit "${bandit_args[@]}"

  dependencies:
    name: OSV dependency scan
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Check lockfile exists
        id: lockfile
        env:
          LOCKFILE_PATH: ${{ inputs.lockfile-path }}
        run: |
          if [[ -f "${LOCKFILE_PATH}" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Lockfile ${LOCKFILE_PATH} not found; skipping OSV scan."
          fi

      - name: OSV Scanner
        if: steps.lockfile.outputs.exists == 'true'
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |
            --lockfile=${{ inputs.lockfile-path }}
            --format=table

  secrets:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks CLI
        env:
          GITLEAKS_IMAGE: ${{ inputs.gitleaks-image }}
          GITLEAKS_CONFIG: ${{ inputs.gitleaks-config }}
        run: |
          set -euo pipefail
          config_args=()
          if [[ -n "${GITLEAKS_CONFIG}" ]]; then
            if [[ ! -f "${GITLEAKS_CONFIG}" ]]; then
              echo "::error::gitleaks-config path '${GITLEAKS_CONFIG}' does not exist in caller repository"
              exit 1
            fi
            echo "Using caller gitleaks config: ${GITLEAKS_CONFIG}"
            config_args+=(--config "/repo/${GITLEAKS_CONFIG}")
          fi
          docker run --rm \
            -v "$PWD:/repo" \
            --workdir /repo \
            "${GITLEAKS_IMAGE}" detect \
            --source=/repo \
            --redact \
            --exit-code=1 \
            "${config_args[@]}"

  trivy-fs:
    name: Trivy filesystem scan
    if: inputs.run-trivy-fs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Run Trivy filesystem scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig
          severity: ${{ inputs.trivy-severity }}
          ignore-unfixed: true
          exit-code: "1"
          hide-progress: true
          trivyignores: ${{ inputs.trivy-ignorefile }}

      - name: Generate SBOM
        if: inputs.sbom-format != ''
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: ${{ inputs.sbom-format }}
          output: sbom-${{ inputs.sbom-format }}.json
          hide-progress: true

      - name: Upload SBOM artifact
        if: inputs.sbom-format != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom-${{ inputs.sbom-format }}
          path: sbom-${{ inputs.sbom-format }}.json
          if-no-files-found: error
