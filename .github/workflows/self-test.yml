name: Self Test

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: Actionlint reusable workflows
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Run actionlint
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD:/repo" \
            --workdir /repo \
            rhysd/actionlint:1.7.7

  docs-check:
    name: Basic docs/config checks
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Check required files
        run: |
          set -euo pipefail
          # Core docs/config
          test -f README.md
          test -f docs/ci-standard.md
          test -f docs/pokeedge-backend-pilot.md
          test -f .github/workflows/python-security-gate.yml
          test -f .github/workflows/javascript-security-gate.yml
          test -f .github/workflows/container-security-gate.yml
          test -f configs/python/bandit.yaml
          test -f configs/gitleaks/gitleaks.toml
          test -f configs/trivy/trivy.yaml
          # Standard building blocks
          test -f .github/actions/setup-python-uv/action.yml
          test -f .github/actions/setup-bun-node/action.yml
          test -f rulesets/sharperflow-app-protection.json
          test -f scripts/apply-ruleset.sh

      - name: Validate ruleset JSON
        run: |
          set -euo pipefail
          python3 -c '
          import json, sys
          d = json.load(open("rulesets/sharperflow-app-protection.json"))
          assert d["target"] == "branch", "ruleset target must be branch"
          assert d["enforcement"] == "active", "ruleset must be active"
          assert d["bypass_actors"] == [], "bypass_actors must be empty (enforce for admins)"
          types = [r["type"] for r in d["rules"]]
          assert "required_status_checks" in types, "missing required_status_checks rule"
          rsc = next(r for r in d["rules"] if r["type"] == "required_status_checks")
          ctxs = [c["context"] for c in rsc["parameters"]["required_status_checks"]]
          assert ctxs == ["Sharperflow CI Gate"], f"required check must be the summary only, got {ctxs}"
          # strict (require-branch-up-to-date) is intentionally OFF: it caused the
          # PR merge-collision loop (rebase + CI-rerun churn) on a 2-seat org with
          # many concurrent agent/bot PRs. Serialization is via native auto-merge +
          # squash; loose checks are caught by the next PR's CI. See ci-standard.md s6.
          assert rsc["parameters"]["strict_required_status_checks_policy"] is False, "strict policy must be OFF (collision-loop fix)"
          # Squash-only is enforced SOLELY by allowed_merge_methods (non_fast_forward
          # only blocks force-pushes, NOT merge commits). This excludes merge-commit
          # AND rebase, giving linear squash history.
          pr = next(r for r in d["rules"] if r["type"] == "pull_request")
          assert pr["parameters"]["allowed_merge_methods"] == ["squash"], \
            f"merge method must be squash-only, got {pr['parameters'].get('allowed_merge_methods')}"
          assert "non_fast_forward" in types, "non_fast_forward (force-push guard) required"
          print("ruleset JSON valid:", types, ctxs, "merge=squash-only strict=off")
          '

  shellcheck:
    name: Shellcheck scripts
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Run shellcheck
        run: |
          set -euo pipefail
          shellcheck scripts/apply-ruleset.sh
