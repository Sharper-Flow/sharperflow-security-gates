name: Container Security Gate

on:
  workflow_call:
    inputs:
      image-ref:
        description: Fully qualified image reference to scan.
        required: true
        type: string
      severity:
        description: Severities that fail the gate.
        required: false
        type: string
        default: "HIGH,CRITICAL"
      ignore-unfixed:
        description: Ignore vulnerabilities without upstream fixes.
        required: false
        type: boolean
        default: true
      trivy-ignorefile:
        description: |
          Comma-separated relative paths to Trivy ignore file(s) in the caller
          repository. Pass either one or more `.trivyignore` files or a single
          `.trivyignore.yaml`. Use to suppress known false positives that the
          gate would otherwise fail on. Empty (default) means no suppressions.
        required: false
        type: string
        default: ""
      sbom-format:
        description: |
          When set, the Trivy image scan also emits a Software Bill of Materials
          (SBOM) for the scanned image and uploads it as a workflow artifact.
          Allowed values: `cyclonedx`, `spdx`. Empty (default) means no SBOM.
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  trivy-image:
    name: Trivy image scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout caller repository
        if: inputs.trivy-ignorefile != ''
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Run Trivy image scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ inputs.image-ref }}
          scanners: vuln,secret
          severity: ${{ inputs.severity }}
          ignore-unfixed: ${{ inputs.ignore-unfixed }}
          exit-code: "1"
          hide-progress: true
          trivyignores: ${{ inputs.trivy-ignorefile }}

      - name: Generate SBOM
        if: inputs.sbom-format != ''
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ inputs.image-ref }}
          format: ${{ inputs.sbom-format }}
          output: sbom-${{ inputs.sbom-format }}.json
          hide-progress: true

      - name: Upload SBOM artifact
        if: inputs.sbom-format != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom-${{ inputs.sbom-format }}
          path: sbom-${{ inputs.sbom-format }}.json
          retention-days: 14
          if-no-files-found: error
