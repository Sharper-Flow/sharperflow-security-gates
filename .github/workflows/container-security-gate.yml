name: Container Security Gate

on:
  workflow_call:
    inputs:
      image-ref:
        description: Fully qualified image reference to scan.
        required: true
        type: string
      severity:
        description: Severities that fail the gate.
        required: false
        type: string
        default: "HIGH,CRITICAL"
      ignore-unfixed:
        description: Ignore vulnerabilities without upstream fixes.
        required: false
        type: boolean
        default: true
      trivy-ignorefile:
        description: |
          Comma-separated relative paths to Trivy ignore file(s) in the caller
          repository. Pass either one or more `.trivyignore` files or a single
          `.trivyignore.yaml`. Use to suppress known false positives that the
          gate would otherwise fail on. Empty (default) means no suppressions.
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  trivy-image:
    name: Trivy image scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout caller repository
        if: inputs.trivy-ignorefile != ''
        uses: actions/checkout@v6

      - name: Run Trivy image scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ inputs.image-ref }}
          scanners: vuln,secret
          severity: ${{ inputs.severity }}
          ignore-unfixed: ${{ inputs.ignore-unfixed }}
          exit-code: "1"
          hide-progress: true
          trivyignores: ${{ inputs.trivy-ignorefile }}
