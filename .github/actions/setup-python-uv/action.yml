name: Setup Python + uv
description: >-
  Shared Sharper Flow composite: install Python and uv, restore the uv cache,
  and sync the project's dependency groups. Consume cross-repo by SHA pin.

inputs:
  python-version:
    description: Python version to install.
    required: false
    default: "3.13"
  sync-args:
    description: Arguments passed to `uv sync` (e.g. "--all-groups", "--frozen").
    required: false
    default: "--all-groups"
  cache-key-suffix:
    description: Optional suffix to scope the uv cache (e.g. a lane name).
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Set up uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      with:
        enable-cache: true
        cache-suffix: ${{ inputs.cache-key-suffix }}

    - name: Sync dependencies
      shell: bash
      env:
        UV_SYNC_ARGS: ${{ inputs.sync-args }}
      run: |
        set -euo pipefail
        # shellcheck disable=SC2086 # intentional word-splitting of caller args
        uv sync ${UV_SYNC_ARGS}
