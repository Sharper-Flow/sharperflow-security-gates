name: Setup Bun + Node
description: >-
  Shared Sharper Flow composite: install Bun and Node, cache the Bun global
  store, then install JS/TS dependencies. Consume cross-repo by SHA pin.

inputs:
  node-version:
    description: Node.js version to install.
    required: false
    default: "24"
  bun-version:
    description: "Bun version to install (default: latest resolved by setup-bun)."
    required: false
    default: ""
  install-mode:
    description: >-
      Dependency install mode. "ci" runs `bun ci` (lockfile-precise, default).
      "install" runs `bun install`. "none" skips install.
    required: false
    default: "ci"

runs:
  using: composite
  steps:
    - name: Set up Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      with:
        bun-version: ${{ inputs.bun-version || 'latest' }}

    - name: Set up Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: ${{ inputs.node-version }}

    # rq-workflowDeterminism: cache the Bun global store (~/.bun/install/cache)
    # so `bun ci` hits cached packages instead of re-downloading. Bun uses a
    # hardlink/symlink model — restoring the global store means `bun ci` only
    # recreates the node_modules symlink tree (<2s on cache hit).
    - name: Cache Bun dependencies
      if: inputs.install-mode != 'none'
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Install dependencies
      shell: bash
      env:
        INSTALL_MODE: ${{ inputs.install-mode }}
      run: |
        set -euo pipefail
        case "${INSTALL_MODE}" in
          ci) bun ci ;;
          install) bun install ;;
          none) echo "install-mode=none; skipping dependency install" ;;
          *) echo "::error::invalid install-mode '${INSTALL_MODE}' (expected ci|install|none)"; exit 1 ;;
        esac
