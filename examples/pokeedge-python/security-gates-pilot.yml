name: Security Gates Pilot

# Non-required pilot for Sharper Flow reusable security gates. Use this to
# measure false positives, suppressions, runtime, and failure modes before
# considering required branch protection.
on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  python-security:
    # TODO: pin to SHA instead of @main once the reusable workflow is stable
    uses: Sharper-Flow/sharperflow-security-gates/.github/workflows/python-security-gate.yml@main
    with:
      python-version: "3.13"
      scan-paths: "api services clients models core common repositories integrations utils"
      lockfile-path: "uv.lock"
      bandit-config: "configs/security/bandit.yaml"
